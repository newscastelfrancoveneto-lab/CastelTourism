<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1b1009" />
  <title>Castelfranco Veneto · Mappa Turistica</title>
  <meta name="description" content="Mappa interattiva del centro storico di Castelfranco Veneto: mura medievali, Giorgione, musei, chiese e parchi." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Crimson Text', serif; color: #2c1a0e; background: #1b1009; }

    :root {
      --parchment: #f3e9cd;
      --parchment-2: #e9dcb6;
      --parchment-dk: #d8c596;
      --ink: #1b1009;
      --ink-2: #2c1a0e;
      --ink-3: #4a2e14;
      --gold: #b8860b;
      --gold-lt: #e3b94e;
      --gold-soft: #d9b15c;
      --red: #8b1a1a;
      --stone: #7a6a52;
      --stone-lt: #a89070;
      --shadow: rgba(20,10,4,0.45);
      --top-h: 104px;
    }

    /* ---------- MAP ---------- */
    #map { position: absolute; inset: 0; z-index: 1; background: #d9c7a6; }
    /* antique tint only on the tiles, so pins & overlays stay vivid */
    .leaflet-tile-pane { filter: sepia(42%) saturate(82%) brightness(0.96) contrast(1.05); }
    .leaflet-container { background: #d9c7a6; font-family: 'Crimson Text', serif; }
    .leaflet-control-attribution { background: rgba(243,233,205,0.82) !important; font-size: 10px; }

    /* gentle vignette for atmosphere */
    #vignette {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      box-shadow: inset 0 0 140px 30px rgba(27,16,9,0.38);
      mix-blend-mode: multiply;
    }

    /* ---------- TOP BAR ---------- */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 900;
      background:
        linear-gradient(180deg, rgba(20,11,4,0.96) 0%, rgba(31,19,9,0.94) 60%, rgba(31,19,9,0.90) 100%);
      border-bottom: 2px solid var(--gold);
      box-shadow: 0 4px 18px var(--shadow);
      padding: max(8px, env(safe-area-inset-top)) 10px 0;
    }
    #brand {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 4px 8px; max-width: 1100px; margin: 0 auto;
    }
    #crest {
      width: 38px; height: 44px; flex-shrink: 0;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
      object-fit: contain;
    }
    #crest-fallback {
      width: 38px; height: 44px; flex-shrink: 0; display: none;
      align-items: center; justify-content: center;
      font-size: 26px; color: var(--gold-lt);
    }
    #brand-txt { flex: 1; min-width: 0; }
    #brand-txt h1 {
      font-family: 'Cinzel Decorative', serif; font-weight: 700;
      font-size: clamp(15px, 4.6vw, 24px); line-height: 1.05;
      color: var(--gold-lt);
      text-shadow: 0 0 10px rgba(184,134,11,0.45), 1px 1px 2px #000;
      letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #brand-txt p {
      font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.34em;
      color: var(--parchment-dk); text-transform: uppercase; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #menu-btn {
      flex-shrink: 0; width: 42px; height: 42px; border-radius: 10px;
      background: rgba(243,233,205,0.06); border: 1px solid var(--gold);
      color: var(--gold-lt); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
    }
    #menu-btn:hover { background: rgba(227,185,78,0.18); }
    #menu-btn:active { transform: scale(0.94); }

    /* filter chips */
    #chips {
      display: flex; gap: 7px; overflow-x: auto; overflow-y: hidden;
      padding: 0 6px 9px; max-width: 1100px; margin: 0 auto;
      scrollbar-width: none;
    }
    #chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em; color: var(--parchment);
      background: rgba(243,233,205,0.07);
      border: 1px solid rgba(217,177,92,0.5); border-radius: 999px;
      padding: 6px 12px; cursor: pointer; white-space: nowrap;
      transition: all .18s ease;
    }
    .chip i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; box-shadow: 0 0 0 1px rgba(0,0,0,0.35); }
    .chip:hover { border-color: var(--gold-lt); color: #fff; }
    .chip.active {
      background: linear-gradient(180deg, var(--gold-lt), var(--gold));
      color: var(--ink); border-color: var(--gold-lt);
      box-shadow: 0 2px 8px rgba(184,134,11,0.4);
    }

    /* ---------- MAP PINS ---------- */
    .pin-wrap { background: none !important; border: none !important; }
    .pin {
      position: relative; width: 40px; height: 52px;
      transform-origin: 50% 100%;
      animation: pinDrop .5s cubic-bezier(.2,.8,.3,1) backwards;
      transition: transform .15s ease, filter .15s ease;
      cursor: pointer;
    }
    .pin svg { display: block; filter: drop-shadow(0 3px 4px rgba(20,10,4,0.5)); }
    .pin:hover { transform: translateY(-3px) scale(1.1); }
    .pin-wrap.is-active { z-index: 1000 !important; }
    .pin-wrap.is-active .pin { transform: translateY(-2px) scale(1.12); }
    .pin-wrap.is-active .pin svg { filter: drop-shadow(0 0 7px var(--c)) drop-shadow(0 3px 4px rgba(0,0,0,0.5)); }
    .pin-wrap.is-active .pin::after {
      content: ""; position: absolute; left: 50%; top: 19px;
      width: 40px; height: 40px; margin: -20px 0 0 -20px; border-radius: 50%;
      border: 2px solid var(--c); animation: ping 1.4s ease-out infinite; pointer-events: none;
    }
    @keyframes pinDrop {
      0% { transform: translateY(-34px) scale(.5); opacity: 0; }
      60% { opacity: 1; }
      80% { transform: translateY(2px) scale(1.04); }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes ping {
      0% { transform: scale(.5); opacity: .9; }
      100% { transform: scale(1.9); opacity: 0; }
    }

    /* ---------- FAB CONTROLS ---------- */
    #fabs {
      position: absolute; right: 12px; bottom: max(24px, env(safe-area-inset-bottom)); z-index: 850;
      display: flex; flex-direction: column; gap: 8px;
    }
    .fab {
      width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
      background: linear-gradient(180deg, var(--parchment), var(--parchment-2));
      border: 1.5px solid var(--gold); color: var(--ink-2);
      font-size: 20px; line-height: 1; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px var(--shadow); transition: transform .1s, background .2s;
    }
    .fab:hover { background: linear-gradient(180deg, #fff8e6, var(--parchment)); }
    .fab:active { transform: scale(0.92); }
    .fab.group { display: flex; flex-direction: column; gap: 0; padding: 0; height: auto; border-radius: 12px; overflow: hidden; }
    .fab.group button {
      width: 44px; height: 40px; border: none; background: transparent; cursor: pointer;
      font-size: 22px; color: var(--ink-2); display: flex; align-items: center; justify-content: center;
    }
    .fab.group button:first-child { border-bottom: 1px solid var(--stone-lt); }
    .fab.group button:hover { background: rgba(184,134,11,0.16); }

    /* ---------- INDEX DRAWER ---------- */
    #scrim {
      position: fixed; inset: 0; z-index: 940; background: rgba(20,10,4,0.5);
      backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    #scrim.open { opacity: 1; pointer-events: auto; }
    #drawer {
      position: fixed; top: 0; bottom: 0; left: 0; z-index: 945;
      width: min(370px, 88vw);
      background: var(--parchment);
      background-image:
        radial-gradient(circle at 18% 12%, rgba(184,134,11,0.07), transparent 60%),
        radial-gradient(circle at 88% 88%, rgba(139,26,26,0.05), transparent 55%);
      border-right: 3px solid var(--gold);
      box-shadow: 6px 0 26px var(--shadow);
      transform: translateX(-104%); transition: transform .3s cubic-bezier(.2,.8,.3,1);
      display: flex; flex-direction: column;
    }
    #drawer.open { transform: translateX(0); }
    #drawer-head {
      padding: max(14px, env(safe-area-inset-top)) 16px 12px;
      background: linear-gradient(180deg, var(--ink-2), var(--ink-3));
      border-bottom: 2px solid var(--gold); color: var(--gold-lt);
      display: flex; align-items: center; justify-content: space-between;
    }
    #drawer-head h2 { font-family: 'Cinzel Decorative', serif; font-size: 17px; letter-spacing: .02em; }
    #drawer-close {
      background: none; border: 1px solid var(--gold); color: var(--gold-lt);
      width: 30px; height: 30px; border-radius: 8px; font-size: 16px; cursor: pointer;
    }
    #search-wrap { padding: 12px 14px 8px; }
    #search {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1.5px solid var(--stone-lt); background: #fffdf4;
      font-family: 'Crimson Text', serif; font-size: 15px; color: var(--ink-2);
    }
    #search:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,134,11,0.18); }
    #count { padding: 0 16px 6px; font-family: 'Cinzel', serif; font-size: 10px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--stone); }
    #idx-list { flex: 1; overflow-y: auto; padding: 4px 10px 24px; scrollbar-width: thin; }
    .idx-item {
      width: 100%; text-align: left; display: flex; align-items: center; gap: 11px;
      background: rgba(255,253,244,0.55); border: 1px solid rgba(168,144,112,0.4);
      border-radius: 12px; padding: 9px 11px; margin-bottom: 8px; cursor: pointer;
      transition: transform .12s, background .18s, border-color .18s;
    }
    .idx-item:hover { background: #fffaec; border-color: var(--gold); transform: translateX(3px); }
    .idx-pin {
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 50% 50% 50% 4px;
      transform: rotate(-45deg);
      background: radial-gradient(circle at 38% 32%, color-mix(in srgb, var(--c) 70%, #fff), var(--c));
      border: 1.6px solid var(--ink-2);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 1px 1px 3px var(--shadow);
    }
    .idx-pin span { transform: rotate(45deg); font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px; color: var(--ink); }
    .idx-txt { min-width: 0; }
    .idx-name { display: block; font-family: 'Cinzel', serif; font-weight: 600; font-size: 14px; color: var(--ink-2); line-height: 1.15; }
    .idx-cat { display: block; font-size: 12.5px; font-style: italic; color: var(--stone); margin-top: 1px; }
    #idx-empty { text-align: center; color: var(--stone); font-style: italic; padding: 30px 16px; display: none; }

    /* ---------- DETAIL SHEET ---------- */
    #sheet-overlay {
      position: fixed; inset: 0; z-index: 9990; background: rgba(16,8,3,0.86);
      backdrop-filter: blur(3px); display: none; align-items: flex-end; justify-content: center;
    }
    #sheet-overlay.open { display: flex; }
    #sheet {
      position: relative; width: 100%; max-width: 660px; height: 92vh;
      background: var(--parchment);
      background-image:
        radial-gradient(circle at 12% 8%, rgba(184,134,11,0.08), transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(139,26,26,0.05), transparent 55%);
      border-radius: 18px 18px 0 0; border-top: 4px solid var(--gold);
      border-left: 2px solid var(--gold); border-right: 2px solid var(--gold);
      box-shadow: 0 -10px 36px var(--shadow); overflow: hidden;
      display: flex; flex-direction: column; animation: sheetUp .32s cubic-bezier(.2,.8,.3,1);
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    #drag { width: 44px; height: 5px; background: rgba(255,255,255,0.7); border-radius: 3px;
      position: absolute; top: 9px; left: 50%; transform: translateX(-50%); z-index: 5; }
    #sheet-close {
      position: absolute; top: 12px; right: 12px; z-index: 6;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      background: rgba(27,16,9,0.78); color: var(--gold-lt); border: 1.5px solid var(--gold);
      font-size: 17px; display: flex; align-items: center; justify-content: center;
    }
    #gallery { position: relative; width: 100%; height: 230px; flex-shrink: 0; background: var(--ink-2); overflow: hidden; }
    #gallery img { width: 100%; height: 100%; object-fit: cover; display: none; }
    #gallery img.active { display: block; animation: fadeIn .4s ease; }
    @keyframes fadeIn { from { opacity: .3; } to { opacity: 1; } }
    #gallery::after { content: ""; position: absolute; inset: 0; pointer-events: none;
      box-shadow: inset 0 -50px 50px -20px rgba(27,16,9,0.55); }
    .gnav {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 3;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      background: rgba(27,16,9,0.55); color: var(--gold-lt); border: 1px solid rgba(227,185,78,0.6);
      font-size: 20px; display: flex; align-items: center; justify-content: center;
    }
    .gnav.prev { left: 9px; } .gnav.next { right: 9px; }
    #dots { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.45); cursor: pointer; transition: background .2s; }
    .dot.active { background: var(--gold-lt); width: 18px; border-radius: 4px; }

    #sheet-body { flex: 1; overflow-y: auto; padding: 16px 18px 28px; scrollbar-width: thin; }
    #sheet-title { font-family: 'Cinzel', serif; font-weight: 700; font-size: clamp(19px, 5.4vw, 27px); color: var(--ink-2); line-height: 1.16; }
    #sheet-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 9px 0 4px; }
    .tag {
      display: inline-flex; align-items: center; gap: 5px; font-family: 'Cinzel', serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 999px; color: #fff;
    }
    .tag.muted { background: var(--parchment-dk); color: var(--ink-3); }
    .subcat { font-style: italic; color: var(--stone); font-size: 13.5px; margin-top: 6px; }

    .actions { display: flex; gap: 8px; margin: 14px 0 2px; }
    .act {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      font-family: 'Cinzel', serif; font-weight: 600; font-size: 13px; letter-spacing: .03em;
      padding: 11px 10px; border-radius: 11px; cursor: pointer; border: 1.5px solid var(--gold);
      transition: transform .1s, filter .15s;
    }
    .act:active { transform: scale(0.97); }
    .act.primary { background: linear-gradient(180deg, var(--gold-lt), var(--gold)); color: var(--ink); }
    .act.primary:hover { filter: brightness(1.06); }
    .act.ghost { background: rgba(255,253,244,0.6); color: var(--ink-3); }
    .act.ghost:hover { background: #fffaec; }

    .section { border-top: 1px solid var(--parchment-dk); margin-top: 16px; padding-top: 12px; }
    .section-title {
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--red); margin-bottom: 8px; display: flex; align-items: center; gap: 7px;
    }
    .section-title::before { content: "❧"; color: var(--gold); font-size: 14px; }
    .text { font-size: 16px; line-height: 1.62; color: var(--ink-3); }
    .text + .text { margin-top: 9px; }
    .text .hl { background: linear-gradient(transparent 62%, rgba(227,185,78,0.5) 62%); padding: 0 1px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .box { background: rgba(255,253,244,0.6); border: 1px solid var(--stone-lt); border-radius: 10px; padding: 9px 11px; }
    .box .label { font-family: 'Cinzel', serif; font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--stone); margin-bottom: 4px; }
    .box .value { font-size: 13.5px; line-height: 1.4; color: var(--ink-2); }
    .tip { background: rgba(184,134,11,0.1); border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0; padding: 10px 12px; }

    /* ---------- SPLASH ---------- */
    #splash {
      position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background:
        radial-gradient(circle at 50% 38%, #3a2410 0%, #1b1009 60%, #0e0703 100%);
      transition: opacity .6s ease; text-align: center; padding: 24px;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash img { width: 92px; height: auto; filter: drop-shadow(0 0 22px rgba(227,185,78,0.55)); animation: float 3s ease-in-out infinite; }
    #splash .glyph { font-size: 64px; color: var(--gold-lt); filter: drop-shadow(0 0 22px rgba(227,185,78,0.55)); }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    #splash h1 { font-family: 'Cinzel Decorative', serif; font-weight: 900; font-size: clamp(22px, 7vw, 38px);
      color: var(--gold-lt); text-shadow: 0 0 24px rgba(184,134,11,0.5); letter-spacing: .02em; }
    #splash p { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .42em; text-transform: uppercase; color: var(--parchment-dk); }
    #splash .bar { width: 160px; height: 3px; border-radius: 3px; overflow: hidden; background: rgba(227,185,78,0.2); margin-top: 6px; }
    #splash .bar i { display: block; height: 100%; width: 40%; background: var(--gold-lt);
      animation: load 1.1s ease-in-out infinite; }
    @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

    /* ---------- TOAST ---------- */
    #toast {
      position: fixed; left: 50%; bottom: 84px; transform: translate(-50%, 20px); z-index: 9995;
      background: var(--ink-2); color: var(--parchment); border: 1px solid var(--gold);
      padding: 10px 16px; border-radius: 10px; font-size: 14px; box-shadow: 0 4px 14px var(--shadow);
      opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; max-width: 86vw; text-align: center;
    }
    #toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* ---------- DESKTOP ---------- */
    @media (min-width: 760px) {
      #sheet-overlay { align-items: center; }
      #sheet { height: auto; max-height: 88vh; border-radius: 18px;
        border: 3px solid var(--gold); animation: popIn .3s cubic-bezier(.2,.8,.3,1); }
      @keyframes popIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      #drag { display: none; }
      #gallery { height: 280px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001s !important; transition-duration: .05s !important; }
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="vignette"></div>

<!-- hidden SVG gradients for the pins -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs id="pin-defs"></defs></svg>

<header id="topbar">
  <div id="brand">
    <img id="crest" alt="Stemma di Castelfranco Veneto"
      src="https://www.comune.castelfrancoveneto.tv.it/wp-content/uploads/2024/06/stemma_comune_castelfranco_veneto.png" />
    <div id="crest-fallback">⚜</div>
    <div id="brand-txt">
      <h1>Castelfranco Veneto</h1>
      <p>Città del Giorgione</p>
    </div>
    <button id="menu-btn" aria-label="Apri l'indice dei luoghi">☰</button>
  </div>
  <div id="chips"></div>
</header>

<div id="fabs">
  <div class="fab group" role="group" aria-label="Zoom">
    <button id="zoom-in" aria-label="Ingrandisci">+</button>
    <button id="zoom-out" aria-label="Riduci">−</button>
  </div>
  <button class="fab" id="locate-btn" aria-label="La mia posizione" title="La mia posizione">◎</button>
  <button class="fab" id="home-btn" aria-label="Inquadra tutto" title="Inquadra tutto">⤢</button>
</div>

<!-- index drawer -->
<div id="scrim"></div>
<aside id="drawer" aria-label="Indice dei luoghi">
  <div id="drawer-head">
    <h2>Luoghi da visitare</h2>
    <button id="drawer-close" aria-label="Chiudi">✕</button>
  </div>
  <div id="search-wrap">
    <input id="search" type="search" placeholder="Cerca un luogo…" autocomplete="off" />
  </div>
  <div id="count"></div>
  <div id="idx-list"></div>
  <div id="idx-empty">Nessun luogo trovato.</div>
</aside>

<!-- detail sheet -->
<div id="sheet-overlay" role="dialog" aria-modal="true">
  <div id="sheet">
    <div id="drag"></div>
    <button id="sheet-close" aria-label="Chiudi">✕</button>
    <div id="gallery">
      <button class="gnav prev" id="g-prev" aria-label="Immagine precedente">‹</button>
      <button class="gnav next" id="g-next" aria-label="Immagine successiva">›</button>
      <div id="dots"></div>
    </div>
    <div id="sheet-body">
      <h2 id="sheet-title"></h2>
      <div id="sheet-chips"></div>
      <div id="sheet-content"></div>
    </div>
  </div>
</div>

/* ============================================================

   ============================================================ */
const map = L.map("map", {
  center: [45.6718, 11.9272],
  zoom: 16,

  attributionControl: true
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {

  subdomains: "abcd",

}).addTo(map);

/* mura: tracciato reale da Overpass (con fallback silenzioso) */
async function caricaMura() {
  const q = `[out:json][timeout:25];(way["historic"="city_wall"](45.668,11.922,45.677,11.932);way["barrier"="city_wall"](45.668,11.922,45.677,11.932);relation["historic"="city_wall"](45.668,11.922,45.677,11.932););(._;>;);out body;`;
  try {
    const r = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: "data=" + encodeURIComponent(q) });
    const data = await r.json();
    const nodes = {};
    data.elements.filter(e => e.type === "node").forEach(n => nodes[n.id] = [n.lat, n.lon]);
    data.elements.filter(e => e.type === "way").forEach(w => {
      const c = w.nodes.map(id => nodes[id]).filter(Boolean);
      if (c.length < 2) return;
      L.polyline(c, { color: "#3d2a00", weight: 13, opacity: 0.22, lineCap: "round", lineJoin: "round" }).addTo(map);
      L.polyline(c, { color: "#8b6914", weight: 6, opacity: 0.9, lineCap: "round", lineJoin: "round" }).addTo(map);
      L.polyline(c, { color: "#f0c040", weight: 2, opacity: 0.7, dashArray: "6,4", lineCap: "round" }).addTo(map);
    });
  } catch (e) { console.warn("Overpass non raggiungibile:", e); }
}
caricaMura();

/* sentiero degli ezzelini: tracciato reale da OSM relation 2247688 */
async function caricaSentieroEzzelini() {
  const q = `[out:json][timeout:30];relation(2247688);(._;>;);out body;`;
  try {
    const r = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: "data=" + encodeURIComponent(q) });
    const data = await r.json();
    const nodes = {};
    data.elements.filter(e => e.type === "node").forEach(n => nodes[n.id] = [n.lat, n.lon]);
    data.elements.filter(e => e.type === "way").forEach(w => {
      const c = w.nodes.map(id => nodes[id]).filter(Boolean);
      if (c.length < 2) return;
      L.polyline(c, { color: "#0d4a1a", weight: 6, opacity: 0.22, lineCap: "round", lineJoin: "round" }).addTo(map);
      L.polyline(c, { color: "#2e7d46", weight: 3, opacity: 0.88, dashArray: "12,7", lineCap: "round", lineJoin: "round" }).addTo(map);
    });

caricaSentieroEzzelini();

/* gradienti dei pin, uno per categoria */
const defs = document.getElementById("pin-defs");
Object.entries(CATEGORIE).forEach(([k, c]) => {
  defs.insertAdjacentHTML("beforeend",
    `<radialGradient id="g-${k}" cx="38%" cy="30%" r="75%">
       <stop offset="0%" stop-color="${mix(c.colore, '#ffffff', 0.45)}"/>
       <stop offset="60%" stop-color="${c.colore}"/>
       <stop offset="100%" stop-color="${mix(c.colore, '#1b1009', 0.45)}"/>
     </radialGradient>`);
});
function mix(hex, withHex, amt) {
  const a = hex.match(/\w\w/g).map(x => parseInt(x, 16));
  const b = withHex.match(/\w\w/g).map(x => parseInt(x, 16));
  return "#" + a.map((v, i) => Math.round(v + (b[i] - v) * amt).toString(16).padStart(2, "0")).join("");
}

function pinIcon(l, i) {
  const c = CATEGORIE[l.cat];
  const html =
    `<div class="pin" style="--c:${c.colore};animation-delay:${Math.min(i * 55, 700)}ms">
       <svg viewBox="0 0 40 52" width="40" height="52">
         <path d="M20 1.5C10 1.5 2.5 9 2.5 19c0 12.5 17.5 31 17.5 31S37.5 31.5 37.5 19C37.5 9 30 1.5 20 1.5Z"
               fill="url(#g-${l.cat})" stroke="#1b1009" stroke-width="2"/>
         <circle cx="20" cy="19" r="11" fill="#f4ecd2" stroke="#1b1009" stroke-width="1.3"/>
         <text x="20" y="24.2" text-anchor="middle" font-family="Cinzel, serif" font-weight="700" font-size="15" fill="#1b1009">${l.simbolo}</text>
       </svg>
     </div>`;
  return L.divIcon({ className: "pin-wrap", html, iconSize: [40, 52], iconAnchor: [20, 50], popupAnchor: [0, -46] });
}

const markers = {};
luoghi.forEach((l, i) => {
  const m = L.marker([l.lat, l.lng], { icon: pinIcon(l, i), title: l.nome, keyboard: false }).addTo(map);
  m.on("click", () => openSheet(l.id));
  markers[l.id] = m;
});

/* luoghi fuori dal centro storico: inquadrati solo col tasto "inquadra tutto" */
const FAR = new Set(["treville"]);
const CORE_BOUNDS = L.latLngBounds(luoghi.filter(l => !FAR.has(l.id)).map(l => [l.lat, l.lng])).pad(0.18);
const ALL_BOUNDS = L.latLngBounds(luoghi.map(l => [l.lat, l.lng])).pad(0.1);
map.fitBounds(CORE_BOUNDS);

/* ============================================================
   FILTRI + RICERCA + INDICE
   ============================================================ */
let activeCat = "tutti";
const chipsEl = document.getElementById("chips");
const searchEl = document.getElementById("search");
const listEl = document.getElementById("idx-list");
const emptyEl = document.getElementById("idx-empty");
const countEl = document.getElementById("count");

function buildChips() {
  const make = (cat, label, color) =>
    `<button class="chip${cat === 'tutti' ? ' active' : ''}" data-cat="${cat}">${color ? `<i style="background:${color}"></i>` : '✦'} ${label}</button>`;
  let h = make("tutti", "Tutti");
  Object.entries(CATEGORIE).forEach(([k, c]) => h += make(k, c.nome, c.colore));
  chipsEl.innerHTML = h;
  chipsEl.querySelectorAll(".chip").forEach(ch => ch.onclick = () => {
    activeCat = ch.dataset.cat;
    chipsEl.querySelectorAll(".chip").forEach(x => x.classList.toggle("active", x === ch));
    applyFilter();
  });
}

function matches(l) {
  const q = searchEl.value.trim().toLowerCase();
  const okCat = activeCat === "tutti" || l.cat === activeCat;
  const okQ = !q || (l.nome + " " + l.sottocat + " " + CATEGORIE[l.cat].nome).toLowerCase().includes(q);
  return okCat && okQ;
}

function applyFilter() {
  let n = 0, html = "";
  luoghi.forEach(l => {
    const vis = matches(l);
    const el = markers[l.id].getElement();
    if (el) el.style.display = vis ? "" : "none";
    if (vis) {
      n++;
      const c = CATEGORIE[l.cat];
      html +=
        `<button class="idx-item" data-id="${l.id}">
           <span class="idx-pin" style="--c:${c.colore}"><span>${l.simbolo}</span></span>
           <span class="idx-txt">
             <span class="idx-name">${l.nome}</span>
             <span class="idx-cat">${c.icona} ${l.sottocat}</span>
           </span>
         </button>`;
    }
  });
  listEl.innerHTML = html;
  emptyEl.style.display = n ? "none" : "block";
  countEl.textContent = n + (n === 1 ? " luogo" : " luoghi");
  listEl.querySelectorAll(".idx-item").forEach(it =>
    it.onclick = () => { closeDrawer(); flyAndOpen(it.dataset.id); });
}

searchEl.addEventListener("input", applyFilter);
buildChips();
applyFilter();

/* ============================================================
   DRAWER
   ============================================================ */
const drawer = document.getElementById("drawer");
const scrim = document.getElementById("scrim");
function openDrawer() { drawer.classList.add("open"); scrim.classList.add("open"); }
function closeDrawer() { drawer.classList.remove("open"); scrim.classList.remove("open"); }
document.getElementById("menu-btn").onclick = openDrawer;
document.getElementById("drawer-close").onclick = closeDrawer;
scrim.onclick = closeDrawer;

/* ============================================================
   FAB
   ============================================================ */
document.getElementById("zoom-in").onclick = () => map.zoomIn();
document.getElementById("zoom-out").onclick = () => map.zoomOut();

document.getElementById("locate-btn").onclick = () => {

  map.locate({ setView: true, maxZoom: 17, enableHighAccuracy: true });
};

map.on("locationerror", () => toast("Posizione non disponibile."));

/* ============================================================
   SHEET (dettaglio luogo)
   ============================================================ */
const overlay = document.getElementById("sheet-overlay");
let gi = 0, gImgs = [];
let activeId = null;

function placeholder(l) {
  const c = CATEGORIE[l.cat];
  const svg =
`<svg xmlns='http://www.w3.org/2000/svg' width='680' height='280' viewBox='0 0 680 280'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0' stop-color='${mix(c.colore, '#1b1009', 0.15)}'/>
      <stop offset='1' stop-color='${mix(c.colore, '#1b1009', 0.55)}'/>
    </linearGradient>
  </defs>
  <rect width='680' height='280' fill='url(#bg)'/>
  <rect x='18' y='18' width='644' height='244' fill='none' stroke='${mix(c.colore, '#ffffff', 0.55)}' stroke-width='2' opacity='0.7'/>
  <rect x='26' y='26' width='628' height='228' fill='none' stroke='${mix(c.colore, '#ffffff', 0.55)}' stroke-width='1' opacity='0.45'/>
  <text x='340' y='150' text-anchor='middle' font-family='Cinzel, serif' font-weight='700' font-size='120' fill='${mix(c.colore, '#ffffff', 0.6)}' opacity='0.92'>${l.simbolo}</text>
  <text x='340' y='210' text-anchor='middle' font-family='Cinzel, serif' font-size='20' letter-spacing='3' fill='#f3e9cd' opacity='0.9'>${CATEGORIE[l.cat].nome.toUpperCase()}</text>
</svg>`;
  return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}

function buildGallery(l) {
  const gal = document.getElementById("gallery");
  gal.querySelectorAll("img").forEach(i => i.remove());
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  gImgs = (l.immagini && l.immagini.length) ? l.immagini.slice() : [placeholder(l)];
  gi = 0;
  gImgs.forEach((src, idx) => {
    const img = document.createElement("img");
    img.src = src; img.alt = l.nome; img.loading = "lazy";
    img.onerror = () => { img.onerror = null; img.src = placeholder(l); };
    if (idx === 0) img.classList.add("active");
    gal.insertBefore(img, gal.querySelector(".gnav.prev"));
    const d = document.createElement("div");
    d.className = "dot" + (idx === 0 ? " active" : "");
    d.onclick = () => setSlide(idx);
    dots.appendChild(d);
  });
  const multi = gImgs.length > 1;
  document.getElementById("g-prev").style.display = multi ? "flex" : "none";
  document.getElementById("g-next").style.display = multi ? "flex" : "none";
  dots.style.display = multi ? "flex" : "none";
}
function setSlide(idx) {
  const imgs = document.querySelectorAll("#gallery img");
  const dots = document.querySelectorAll(".dot");
  if (!imgs.length) return;
  imgs[gi].classList.remove("active"); dots[gi].classList.remove("active");
  gi = (idx + gImgs.length) % gImgs.length;
  imgs[gi].classList.add("active"); dots[gi].classList.add("active");
}
document.getElementById("g-prev").onclick = () => setSlide(gi - 1);
document.getElementById("g-next").onclick = () => setSlide(gi + 1);

function openSheet(id) {
  const l = luoghi.find(x => x.id === id);
  if (!l) return;
  setActiveMarker(id);
  const c = CATEGORIE[l.cat];

  document.getElementById("sheet-title").textContent = l.nome;
  document.getElementById("sheet-chips").innerHTML =
    `<span class="tag" style="background:${c.colore}">${c.icona} ${c.nome}</span>
     <span class="subcat">${l.sottocat}</span>`;

  buildGallery(l);

  const p = l.pratico;
  let html = l.storia.split("\n\n").map(t => `<p class="text">${t}</p>`).join("");

  html += `<div class="actions">
      <a class="act primary" target="_blank" rel="noopener"
         href="https://www.google.com/maps/dir/?api=1&destination=${l.lat},${l.lng}">➤ Indicazioni</a>
      <a class="act ghost" target="_blank" rel="noopener"
         href="https://www.google.com/maps/search/?api=1&query=${l.lat},${l.lng}">🗺 Google Maps</a>
      <button class="act ghost" id="center-btn">◎ Mappa</button>
    </div>`;

  html += `<div class="section"><div class="section-title">Informazioni pratiche</div><div class="grid">`;
  if (p.orari) html += `<div class="box"><div class="label">Orari</div><div class="value">${p.orari}</div></div>`;
  if (p.costo) html += `<div class="box"><div class="label">Costi</div><div class="value">${p.costo}</div></div>`;
  html += `</div>`;
  if (p.accesso) html += `<div class="box" style="margin-top:9px"><div class="label">Come arrivare</div><div class="value">${p.accesso}</div></div>`;
  html += `</div>`;

  if (p.tip) html += `<div class="section"><div class="section-title">Suggerimento</div><div class="tip text">${p.tip}</div></div>`;

  document.getElementById("sheet-content").innerHTML = html;
  const cb = document.getElementById("center-btn");
  if (cb) cb.onclick = () => { closeSheet(); flyTo(id); };

  overlay.classList.add("open");
  document.getElementById("sheet-body").scrollTop = 0;
}
function closeSheet() { overlay.classList.remove("open"); setActiveMarker(null); }

function setActiveMarker(id) {
  if (activeId && markers[activeId]) markers[activeId].getElement()?.classList.remove("is-active");
  activeId = id;
  if (id && markers[id]) markers[id].getElement()?.classList.add("is-active");
}
function flyTo(id) {
  const l = luoghi.find(x => x.id === id); if (!l) return;
  setActiveMarker(id);
  map.flyTo([l.lat, l.lng], Math.max(map.getZoom(), 17), { duration: 0.7 });
}
function flyAndOpen(id) {
  const l = luoghi.find(x => x.id === id); if (!l) return;
  map.flyTo([l.lat, l.lng], Math.max(map.getZoom(), 17), { duration: 0.6 });
  setTimeout(() => openSheet(id), 360);
}

document.getElementById("sheet-close").onclick = closeSheet;
overlay.addEventListener("click", e => { if (e.target === overlay) closeSheet(); });
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (overlay.classList.contains("open")) closeSheet();
  else if (drawer.classList.contains("open")) closeDrawer();
});

/* swipe-down per chiudere lo sheet (mobile) */
let startY = 0, dragging = false;
const sheet = document.getElementById("sheet");
sheet.addEventListener("touchstart", e => {
  if (document.getElementById("sheet-body").scrollTop <= 0) { startY = e.touches[0].clientY; dragging = true; }
}, { passive: true });
sheet.addEventListener("touchmove", e => {
  if (!dragging) return;
  const dy = e.touches[0].clientY - startY;
  if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
}, { passive: true });
sheet.addEventListener("touchend", e => {
  if (!dragging) return; dragging = false;
  const dy = e.changedTouches[0].clientY - startY;
  sheet.style.transform = "";
  if (dy > 90) closeSheet();
}, { passive: true });

/* ============================================================
   TOAST + SPLASH
   ============================================================ */
let toastT = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove("show"), 2600);
}

function hideSplash() { document.getElementById("splash").classList.add("hidden"); }
map.whenReady(() => setTimeout(hideSplash, 700));
window.addEventListener("load", () => setTimeout(hideSplash, 900));
setTimeout(hideSplash, 2600); // fallback

/* stemma: fallback al glifo se l'immagine non carica */
["crest", "splash-crest"].forEach(id => {
  const img = document.getElementById(id);
  img.onerror = () => {
    img.style.display = "none";
    const fb = id === "crest" ? document.getElementById("crest-fallback") : document.getElementById("splash-glyph");
    if (fb) fb.style.display = "flex";
  };
});
</script>
