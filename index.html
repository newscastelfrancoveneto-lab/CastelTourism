<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Castelfranco Veneto – Mappa Turistica</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }

    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap');

    :root {
      --parchment: #f2e8c9;
      --parchment-dk: #d9c89a;
      --ink: #2c1a0e;
      --ink-lt: #4a2e14;
      --gold: #b8860b;
      --gold-lt: #daa520;
      --red-heraldic: #8b1a1a;
      --stone: #7a6a52;
      --stone-lt: #a89070;
      --shadow: rgba(44,26,14,0.45);
    }

    #map {
      position: absolute; inset: 0;
      z-index: 1;
      filter: sepia(55%) saturate(70%) brightness(0.92) contrast(1.05);
    }

    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 900;
      background: linear-gradient(135deg, var(--ink) 0%, var(--ink-lt) 50%, var(--ink) 100%);
      border-bottom: 3px solid var(--gold);
      padding: 8px 14px 6px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px var(--shadow);
    }
    #header h1 {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: clamp(13px, 4vw, 22px);
      color: var(--gold-lt);
      text-shadow: 0 0 8px rgba(184,134,11,0.6), 1px 1px 2px #000;
      letter-spacing: 0.05em;
      text-align: center;
    }
    #header .crown { font-size: 1.3em; margin: 0 8px; }

    .custom-marker {
      width: 36px; height: 36px;
      background: radial-gradient(circle at 40% 35%, var(--gold-lt), var(--gold));
      border: 2.5px solid var(--ink);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 2px 2px 6px var(--shadow);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .custom-marker span {
      transform: rotate(45deg);
      font-size: 14px;
      line-height: 1;
      color: var(--ink);
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .custom-marker:hover { filter: brightness(1.15); }

    #popup-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(20,10,5,0.88);
      display: none;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    #popup-overlay.open { display: flex; }

    #popup-card {
      background: var(--parchment);
      width: 100%; max-width: 640px;
      height: 92vh;
      border-radius: 16px 16px 0 0;
      border-top: 4px solid var(--gold);
      border-left: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 -8px 30px var(--shadow);
      animation: slideUp .3s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #popup-drag {
      width: 40px; height: 5px;
      background: var(--stone-lt);
      border-radius: 3px;
      margin: 10px auto 4px;
      flex-shrink: 0;
    }

    #popup-gallery {
      width: 100%; height: 200px; flex-shrink: 0;
      position: relative; overflow: hidden;
      background: var(--ink);
    }
    #popup-gallery img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    #popup-gallery img.active { display: block; }
    #popup-gallery .gallery-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(44,26,14,0.6); color: var(--gold-lt);
      border: none; border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #popup-gallery .gallery-nav.prev { left: 8px; }
    #popup-gallery .gallery-nav.next { right: 8px; }
    #popup-gallery .gallery-dots {
      position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px;
    }
    .gallery-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.45); cursor: pointer;
    }
    .gallery-dot.active { background: var(--gold-lt); }

    #popup-body {
      flex: 1; overflow-y: auto; padding: 14px 16px 24px;
      scrollbar-width: thin; scrollbar-color: var(--stone-lt) var(--parchment-dk);
    }

    #popup-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(17px, 5vw, 26px);
      color: var(--ink);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    #popup-category {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      color: var(--stone);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .popup-section {
      border-top: 1px solid var(--parchment-dk);
      margin-top: 12px; padding-top: 10px;
    }
    .popup-section-title {
      font-family: 'Cinzel', serif;
      font-size: 12px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--red-heraldic);
      margin-bottom: 6px;
    }
    .popup-text {
      font-family: 'Crimson Text', serif;
      font-size: 15px; line-height: 1.6; color: var(--ink-lt);
    }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-top: 4px;
    }
    .info-box {
      background: var(--parchment-dk);
      border: 1px solid var(--stone-lt);
      border-radius: 6px; padding: 8px 10px;
    }
    .info-box .label {
      font-family: 'Cinzel', serif;
      font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--stone);
      margin-bottom: 3px;
    }
    .info-box .value {
      font-family: 'Crimson Text', serif;
      font-size: 13px; color: var(--ink);
    }

    #popup-close {
      position: absolute; top: 12px; right: 14px; z-index: 1;
      background: var(--ink); color: var(--gold-lt);
      border: 1px solid var(--gold); border-radius: 50%;
      width: 30px; height: 30px; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    #legend {
      position: absolute; bottom: 20px; right: 10px; z-index: 800;
      background: rgba(242,232,201,0.93);
      border: 1.5px solid var(--gold);
      border-radius: 8px; padding: 8px 10px;
      font-family: 'Crimson Text', serif; font-size: 12px; color: var(--ink);
      max-width: 130px; box-shadow: 2px 2px 8px var(--shadow);
    }
    #legend strong {
      font-family: 'Cinzel', serif; font-size: 10px; display: block;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 5px; color: var(--red-heraldic);
    }
    .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>

    <div id="popup-body">

    [out:json][timeout:25];

      way["man_made"="embankment"]["name"~"[Mm]ura"](45.668,11.926,45.677,11.937);
    );
    (._;>;);
    out body;
  `;
  try {
    const resp = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: "data=" + encodeURIComponent(query)
    });
    const data = await resp.json();
    const nodes = {};
    data.elements.filter(e => e.type === "node").forEach(n => { nodes[n.id] = [n.lat, n.lon]; });
    const ways = data.elements.filter(e => e.type === "way");

    ways.forEach(way => {
      const coords = way.nodes.map(nid => nodes[nid]).filter(Boolean);
      if (coords.length < 2) return;
      L.polyline(coords, { color: "#3d2a00", weight: 14, opacity: 0.25, lineCap: "round", lineJoin: "round" }).addTo(map);
      L.polyline(coords, { color: "#8b6914", weight: 7, opacity: 0.95, lineCap: "round", lineJoin: "round" }).addTo(map);
      L.polyline(coords, { color: "#f0c040", weight: 2, opacity: 0.7, lineCap: "round", lineJoin: "round", dashArray: "6,4" }).addTo(map);
    });
  } catch(e) {
    console.warn("Overpass non raggiungibile, mura non caricate:", e);
  }
}
caricaMura();

L.control.zoom({ position: "bottomright" }).addTo(map);

function creaIcona(simbolo, colore) {
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="${colore}"/>
        <stop offset="100%" stop-color="#5f4710"/>
      </linearGradient>
    </defs>
    <circle cx="18" cy="18" r="16" fill="url(#g)" stroke="#2c1a0e" stroke-width="2.2"/>
    <text x="18" y="22" text-anchor="middle"
      font-family="Cinzel, serif" font-size="14" font-weight="700"
      fill="#f2e8c9">${simbolo}</text>
  </svg>`;
  return L.divIcon({
    className: "",
    html: `<div style="width:36px;height:36px;">${svg}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -36]
  });
}

luoghi.forEach(luogo => {
  const marker = L.marker([luogo.lat, luogo.lng], { icon: creaIcona(luogo.simbolo, luogo.colore) }).addTo(map);
  marker.on("click", () => apriPopup(luogo));
});

let galleryIndex = 0;
let galleryImgs = [];

function apriPopup(luogo) {
  galleryImgs = luogo.immagini || [];
  galleryIndex = 0;

  document.getElementById("popup-title").textContent = luogo.nome;
  document.getElementById("popup-category").textContent = luogo.categoria;

  const gallery = document.getElementById("popup-gallery");
  gallery.querySelectorAll("img").forEach(i => i.remove());
  const dots = document.getElementById("gallery-dots");
  dots.innerHTML = "";

  if (galleryImgs.length === 0) {
    gallery.style.height = "0";
    gallery.style.display = "none";
  } else {
    gallery.style.height = "200px";
    gallery.style.display = "block";
    galleryImgs.forEach((src, idx) => {
      const img = document.createElement("img");
      img.src = src;
      img.alt = luogo.nome;
      img.onerror = () => { img.src = "https://via.placeholder.com/640x200/2c1a0e/daa520?text=Immagine+non+disponibile"; };
      if (idx === 0) img.classList.add("active");
      gallery.insertBefore(img, gallery.querySelector(".gallery-nav.prev"));

      const dot = document.createElement("div");
      dot.className = "gallery-dot" + (idx === 0 ? " active" : "");
      dot.onclick = () => setGalleryIndex(idx);
      dots.appendChild(dot);
    });
  }

  let html = `<p class="popup-text">${luogo.storia.replace(/\n\n/g, '</p><p class="popup-text">')}</p>`;
  html += `<div class="popup-section">`;
  html += `<div class="popup-section-title">⚙ Informazioni pratiche</div>`;
  html += `<div class="info-grid">`;
  if (luogo.pratico.orari) html += `<div class="info-box"><div class="label">🕐 Orari</div><div class="value">${luogo.pratico.orari}</div></div>`;
  if (luogo.pratico.costo) html += `<div class="info-box"><div class="label">💰 Costi</div><div class="value">${luogo.pratico.costo}</div></div>`;
  html += `</div>`;
  if (luogo.pratico.accesso) html += `<p class="popup-text" style="margin-top:8px">📍 ${luogo.pratico.accesso}</p>`;
  html += `</div>`;
  if (luogo.pratico.tip) {
    html += `<div class="popup-section"><div class="popup-section-title">✨ Chicca del viandante</div>`;
    html += `<p class="popup-text">${luogo.pratico.tip}</p></div>`;
  }
  document.getElementById("popup-content").innerHTML = html;

  const overlay = document.getElementById("popup-overlay");
  overlay.classList.add("open");
  document.getElementById("popup-body").scrollTop = 0;
}

function setGalleryIndex(idx) {
  const imgs = document.querySelectorAll("#popup-gallery img");
  const dots = document.querySelectorAll(".gallery-dot");
  if (imgs.length === 0) return;
  imgs[galleryIndex].classList.remove("active");
  dots[galleryIndex].classList.remove("active");
  galleryIndex = (idx + galleryImgs.length) % galleryImgs.length;
  imgs[galleryIndex].classList.add("active");
  dots[galleryIndex].classList.add("active");
}

document.getElementById("prev-img").onclick = () => setGalleryIndex(galleryIndex - 1);
document.getElementById("next-img").onclick = () => setGalleryIndex(galleryIndex + 1);
document.getElementById("popup-close").onclick = chiudiPopup;
document.getElementById("popup-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("popup-overlay")) chiudiPopup();
});

function chiudiPopup() {
  document.getElementById("popup-overlay").classList.remove("open");
}

let startY = 0;
document.getElementById("popup-card").addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
document.getElementById("popup-card").addEventListener("touchend", e => {
  if (e.changedTouches[0].clientY - startY > 80) chiudiPopup();
}, { passive: true });

document.addEventListener("keydown", e => { if (e.key === "Escape") chiudiPopup(); });
</script>
</body>
